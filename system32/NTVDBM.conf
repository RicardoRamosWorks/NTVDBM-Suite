#   ██╗   ██╗██████╗ ██████╗ ███╗   ███╗		  unsupported machines
#   ██║   ██║██╔══██╗██╔══██╗████╗ ████║
#   ██║   ██║██║  ██║██████╔╝██╔████╔██║
