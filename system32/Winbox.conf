#
#
#	888       888 d8b          888
#	888   o   888 Y8P          888
#	888  d8b  888              888
#	888 d888b 888 888 88888b.  88888b.   .d88b.  888  888
#	888d88888b888 888 888 "88b 888 "88b d88""88b `Y8bd8P'
#	88888P Y88888 888 888  888 888  888 888  888   X88K
#	8888P   Y8888 888 888  888 888 d88P Y88..88P .d8""8b.
#	888P     Y888 888 888  888 88888P"   "Y88P"  888  888
# 
#		This is the emulator configuration file; you can configure the virtual windows
# according to your needs. Lines starting with # are comments and will be ignored by Winbox.
#	   Please use Notepad++ or equivalent for the best display of characters and tabs.

[sdl]
#  ╔══════════════════════╤══════════════════════════════════════════════════════════════╗
#  ║    ☻ fullscreen ☻    │ Start Winbox directly in fullscreen                          ║
#  ╟──────────────────────┼──────────────────────────────────────────────────────────────╢
#  ║    ☻ fulldouble ☻    │ Use double buffering in fullscreen                           ║
#  ╟──────────────────────┼──────────────────────────────────────────────────────────────╢
#  ║  ☻ fullresolution ☻  │ What resolution to use for fullscreen                        ║
#  ╟──────────────────────┼──────────────────────────────────────────────────────────────╢
#  ║ ☻ windowresolution ☻ │ Scale the window to this size                                ║
#  ╟──────────────────────┼──────────────────────────────────────────────────────────────╢
#  ║      ☻ output ☻      │ What video system to use for output                          ║
#  ║                      │ Values: surface, overlay, opengl, openglnb                   ║
#  ╟──────────────────────┼──────────────────────────────────────────────────────────────╢
#  ║     ☻ autolock ☻     │ Mouse will automatically lock                                ║
#  ╟──────────────────────┼──────────────────────────────────────────────────────────────╢
#  ║    ☻ sensitivity ☻   │ Mouse sensitivity                                            ║
#  ╟──────────────────────┼──────────────────────────────────────────────────────────────╢
#  ║    ☻ waitonerror ☻   │ Wait before closing if Winbox has an error                   ║
#  ╟──────────────────────┼──────────────────────────────────────────────────────────────╢
#  ║     ☻ priority ☻     │ Priority levels for Winbox                                   ║
#  ║                      │ Values: [lowest] [lower] [normal] [higher] [highest] [pause] ║
#  ╟──────────────────────┼──────────────────────────────────────────────────────────────╢
#  ║    ☻ mapperfile ☻    │ File used to load/save the key/event mappings from           ║
#  ╚══════════════════════╧══════════════════════════════════════════════════════════════╝

fullscreen       = false
fulldouble       = false
fullresolution   = original
windowresolution = original
output           = surface
autolock         = false
sensitivity      = 120
waitonerror      = true
priority         = higher,normal
mapperfile       = mapper-1.0.map
usescancodes     = true


[render]
#	╔═══════════════════╤═══════════════════════════════════════════════════════════════════════════════════════════════╗
#	║	 § frameskip §	│ How many frames to skip before drawing one													║
#	╟───────────────────┼───────────────────────────────────────────────────────────────────────────────────────────────╢
#	║	  § aspect § 	│ Do aspect correction, if your output method doesn't support scaling this can slow things down	║
#	╟───────────────────┼───────────────────────────────────────────────────────────────────────────────────────────────╢
#	║					│ Scaler used to enlarge/enhance low resolution modes. If 'forced' is appended,					║
#	║					│ then the scaler will be used even if the result might not be desired							║
#	║     § scaler §	│ To fit a scaler in the resolution used at full screen may require a border or side bars,		║
#	║					│ to fill the screen entirely, depending on your hardware, a different scaler might work		║
#	║					│ Values: [none] [normal2x] [normal3x] [tv2x] [rgb2x] [scan2x]									║
#	╟───────────────────┼───────────────────────────────────────────────────────────────────────────────────────────────╢
#	║					│ Path to GLSL shader source to use with OpenGL output ("none" to disable)						║
#	║	 § glshader §	│ Can be either an absolute path, a file in the "glshaders" subdirectory						║
#	║					│ of the Winbox configuration directory, or one of the built-in shaders:						║
#	║					│ [advinterp2x] [advmame2x] [rgb2x] [scan2x] [tv2x] [sharp]										║
#	╚═══════════════════╧═══════════════════════════════════════════════════════════════════════════════════════════════╝

frameskip = 0
aspect    = false
scaler    = normal2x


[cpu]
#	╔═══════════════════╤═══════════════════════════════════════════════════════════════════════════════╗
#	║					│ CPU Core used in emulation. auto will switch to dynamic if available and		║
#	║		≡ core ≡	│ appropriate																	║
#	║					│ Values: [auto] [dynamic] [normal] [simple ]									║
#	╟───────────────────┼───────────────────────────────────────────────────────────────────────────────╢
#	║	  ≡ cputype ≡	│ CPU Type used in emulation. auto is the fastest choice						║
#	║					│ Values: [auto] [386] [386_slow] [486_slow] [pentium_slow] [386_prefetch]		║
#	╟───────────────────┼───────────────────────────────────────────────────────────────────────────────╢
#	║					│ Number of instructions Winbox tries to emulate each millisecond				║
#	║					│ Setting this value too high results in sound dropouts and lags				║
#	║					│ Cycles can be set in 3 ways:													║
#	║					│	'auto'			tries to guess what a game needs							║
#	║	  ≡ cycles ≡	│					It usually works, but can fail for certain games			║
#	║					│	'fixed #number' will set a fixed number of cycles. This is what you usually	║
#	║					│					need if 'auto' fails (Example: fixed 4000)					║
#	║					│	'max'			will allocate as much cycles as your computer is able to	║
#	║					│					handle														║
#	║					│ Values: [auto] [fixed] [max ]													║
#	╟───────────────────┼───────────────────────────────────────────────────────────────────────────────╢
#	║	 ≡ cycleup ≡	│ Amount of cycles to decrease/increase with keycombos.(CTRL-F11/CTRL-F12)		║
#	╟───────────────────┼───────────────────────────────────────────────────────────────────────────────╢
#	║	 ≡ cycledown ≡	│ Setting it lower than 100 will be a percentage								║
#	╚═══════════════════╧═══════════════════════════════════════════════════════════════════════════════╝

core      = auto
cputype   = auto
cycles    = auto
cycleup   = 10
cycledown = 20


[mixer]
#	╔═══════════════╤═══════════════════════════════════════════════════════════════════════════════════════════════════════╗
#	║  • nosound •  │ Enable silent mode, sound is still emulated though													║
#	╟───────────────┼───────────────────────────────────────────────────────────────────────────────────────────────────────╢
#	║    • rate •   │ Mixer sample rate, setting any device's rate higher than this will probably lower their sound quality ║
#	║               │ Values: [22050] [16000] [11025] [8000]																║
#	╟───────────────┼───────────────────────────────────────────────────────────────────────────────────────────────────────╢
#	║ • blocksize • │ Mixer block size, larger blocks might help sound stuttering but sound will also be more lagged		║
#	║               │ Values: [512] [256] [1024] [2048] [4096] [8192]														║
#	╟───────────────┼───────────────────────────────────────────────────────────────────────────────────────────────────────╢
#	║ • prebuffer • │ How many milliseconds of data to keep on top of the blocksize											║
#	╚═══════════════╧═══════════════════════════════════════════════════════════════════════════════════════════════════════╝

nosound   = false
rate      = 22050
blocksize = 1024
prebuffer = 25


[sblaster]
#	╔════════════════╤══════════════════════════════════════════════════════════════════════════════════════════════════════╗
#	║   ♫ sbtype ♫   │ Type of Soundblaster to emulate																		║
#	║                │ Values: [sb1] [sb2] [sbpro1] [sbpro2] [sb16] [none]													║
#	╟────────────────┼──────────────────────────────────────────────────────────────────────────────────────────────────────╢
#	║   ♫ sbbase ♫   │ The IO address of the soundblaster																	║
#	║                │ Values: [220] [240] [260] [280] [2a0] [2c0] [2e0] [300]												║
#	╟────────────────┼──────────────────────────────────────────────────────────────────────────────────────────────────────╢
#	║     ♫ irq ♫    │ The IRQ number of the soundblaster																	║
#	║                │ Values: [7] [5] [3] [9] [10] [11] [12]																║
#	╟────────────────┼──────────────────────────────────────────────────────────────────────────────────────────────────────╢
#	║     ♫ dma ♫    │ The DMA number of the soundblaster																	║
#	║                │ Values: [1] [5] [0] [3] [6] [7]																		║
#	╟────────────────┼──────────────────────────────────────────────────────────────────────────────────────────────────────╢
#	║    ♫ hdma ♫    │ The High DMA number of the soundblaster																║
#	║                │ Values: [1] [5] [0] [3] [6] [7]																		║
#	╟────────────────┼──────────────────────────────────────────────────────────────────────────────────────────────────────╢
#	║   ♫ sbmixer ♫  │ Allow the soundblaster mixer to modify the Winbox mixer												║
#	╟────────────────┼──────────────────────────────────────────────────────────────────────────────────────────────────────╢
#	║   ♫ oplmode ♫  │ Type of OPL emulation. On 'auto' the mode is determined by sblaster type								║
#	║                │ Values: [auto] [cms] [opl2] [dualopl2] [opl3] [opl3gold] [none]										║
#	╟────────────────┼──────────────────────────────────────────────────────────────────────────────────────────────────────╢
#	║   ♫ oplemu ♫   │ Provider for the OPL emulation. compat might provide better quality (see oplrate as well)			║
#	║                │ Values: [default] [compat] [fast]																	║
#	╟────────────────┼──────────────────────────────────────────────────────────────────────────────────────────────────────╢
#	║   ♫ oplrate ♫  │ Sample rate of OPL music emulation. Use 49716 for highest quality (set the mixer rate accordingly)	║
#	║                │ Values: [22050] [16000] [11025] [8000]																║
#	╟────────────────┼──────────────────────────────────────────────────────────────────────────────────────────────────────╢
#	║ ♫ fmstrength ♫ │ Strength of the FM playback volume in percent, in relation to PCM playback volume. Default is 150	║
#	║                │ Values: [1] to [1000] (0.01x to 10x)																	║
#	╚════════════════╧══════════════════════════════════════════════════════════════════════════════════════════════════════╝

sbtype  = sb16
sbbase  = 220
irq     = 7
dma     = 1
hdma    = 5
sbmixer = true
oplmode = auto
oplemu  = fast
oplrate = 22050


[speaker]
#	╔═══════════════╤════════════════════════════════════════════════════════════════╗
#	║ ♪ pcspeaker ♪ │ Enable PC-Speaker emulation									 ║
#	╟───────────────┼────────────────────────────────────────────────────────────────╢
#	║   ♪ pcrate ♪  │ Sample rate of the PC-Speaker sound generation				 ║
#	║               │ Values: [22050] [16000] [11025] [8000]						 ║
#	╚═══════════════╧════════════════════════════════════════════════════════════════╝

pcspeaker = true
pcrate    = 22050


[joystick]
#	╔═══════════════════╤═══════════════════════════════════════════════════════════════════════════════════════╗
#	║					│ Type of joystick to emulate: auto (default),											║
#	║					│   none (disables joystick emulation),													║
#	║					│	2axis (supports two joysticks),														║
#	║					│	4axis (supports one joystick, first joystick used),									║
#	║  ↔ joysticktype ↔	│	4axis_2 (supports one joystick, second joystick used),								║
#	║					│	fcs (Thrustmaster), ch (CH Flightstick)												║
#	║					│	auto chooses emulation depending on real joystick(s)								║
#	║					│	(Remember to reset Winbox's mapperfile if you saved it earlier)						║
#	║					│	Values: [auto] [2axis] [4axis] [4axis_2] [fcs] [ch] [none]							║
#	╟───────────────────┼───────────────────────────────────────────────────────────────────────────────────────╢
#	║	 ↔ timed ↔		│ Enable timed intervals for axis. Experiment with this option, if your joystick drifts ║
#	╟───────────────────┼───────────────────────────────────────────────────────────────────────────────────────╢
#	║	↔ autofire ↔	│ Continuously fires as long as you keep the button pressed								║
#	╟───────────────────┼───────────────────────────────────────────────────────────────────────────────────────╢
#	║	 ↔ swap34 ↔		│ Swap the 3rd and the 4th axis. Can be useful for certain joysticks					║
#	╟───────────────────┼───────────────────────────────────────────────────────────────────────────────────────╢
#	║	↔ buttonwrap ↔	│ Enable button wrapping at the number of emulated buttons								║
#	╟───────────────────┼───────────────────────────────────────────────────────────────────────────────────────╢
#	║ ↔ circularinput ↔ │ Enable translation of circular input to square output									║
#	║					│ Try enabling this if your left analog stick can only move in a circle					║
#	╟───────────────────┼───────────────────────────────────────────────────────────────────────────────────────╢
#	║	 ↔ deadzone ↔	│ The percentage of motion to ignore. 100 turns the stick into a digital one			║
#	╚═══════════════════╧═══════════════════════════════════════════════════════════════════════════════════════╝

vmware       = true
joysticktype = none
timed        = true
autofire     = false
swap34       = false
buttonwrap   = false


[dos]
#	╔════════════════╤═══════════════════════════════════════════════════════════════════╗
#	║	 ☼ xms ☼	 │ Enable XMS support												 ║
#	╟────────────────┼───────────────────────────────────────────────────────────────────╢
#	║				 │ Enable EMS support. The default (=true) provides the best		 ║
#	║				 │	compatibility but certain applications may run better with		 ║
#	║	  ☼ ems ☼	 │	other choices, or require EMS support to be disabled (=false)	 ║
#	║				 │	to work at all													 ║
#	║				 │	Values: true, emsboard, emm386, false							 ║
#	╟────────────────┼───────────────────────────────────────────────────────────────────╢
#	║	  ☼ umb ☼	 │ Enable UMB support												 ║
#	╟────────────────┼───────────────────────────────────────────────────────────────────╢
#	║ keyboardlayout │ Language code of the keyboard layout (or none)					 ║
#	╚════════════════╧═══════════════════════════════════════════════════════════════════╝

xms            = true
ems            = true
umb            = true
keyboardlayout = auto


[autoexec]
#	╔═══════════════════════════════════════════════════╗
#	║	Lines in this section will be run at startup	║
#	║	   ▼ You can put your MOUNT lines here ▼    	║
